<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komma-Memory – Klasse 5</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 16px; padding: 24px; max-width: 780px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; color: #1a1a1a; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
    .setup-screen label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    .setup-screen input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .setup-screen input:focus { border-color: #7F77DD; }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .cat-btn { padding: 10px 12px; border-radius: 10px; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 13px; text-align: left; color: #333; transition: all 0.15s; }
    .cat-btn.active { border-color: #534AB7; background: #EEEDFE; color: #3C3489; font-weight: 600; }
    .cat-note { font-size: 12px; color: #888; margin-top: 8px; }
    .divider { height: 1px; background: #eee; margin: 16px 0; }

    /* BIG TURN DISPLAY */
    .turn-display { border-radius: 16px; padding: 18px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
    .turn-display .arrow { font-size: 28px; }
    .turn-display .turn-info { flex: 1; }
    .turn-display .turn-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
    .turn-display .turn-name { font-size: 28px; font-weight: 700; line-height: 1.1; }
    .turn-display .turn-extra { font-size: 13px; margin-top: 4px; opacity: 0.75; }
    .turn-display .turn-score { font-size: 36px; font-weight: 700; opacity: 0.25; }
    .turn-p1 { background: #EEEDFE; color: #3C3489; border: 2px solid #7F77DD; }
    .turn-p2 { background: #E1F5EE; color: #085041; border: 2px solid #1D9E75; }
    .bonus-pulse { animation: bonusPulse 0.5s ease; }
    @keyframes bonusPulse { 0%{transform:scale(1)} 40%{transform:scale(1.04)} 100%{transform:scale(1)} }

    /* Score bar */
    .player-bar { display: flex; gap: 10px; margin-bottom: 14px; }
    .player-card { flex: 1; border-radius: 12px; border: 2px solid transparent; padding: 10px 14px; transition: opacity 0.2s; }
    .player-card h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .player-card p { font-size: 13px; color: #555; }
    .pc1 { background: #EEEDFE; border-color: #7F77DD; }
    .pc1 h4 { color: #3C3489; }
    .pc2 { background: #E1F5EE; border-color: #1D9E75; }
    .pc2 h4 { color: #085041; }
    .inactive { opacity: 0.38; border-color: transparent !important; }

    .cat-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; font-weight: 600; }

    /* Grid */
    .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; aspect-ratio: 3/2; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: transform 0.15s; min-height: 75px; background: white; }
    .card:hover:not(.matched) { transform: scale(1.03); }
    .card-back { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; }
    .card-front { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; padding: 6px; text-align: center; }
    .card.flipped .card-back { display: none; }
    .card.flipped .card-front { display: flex; }
    .card.matched { pointer-events: none; border-width: 2px; }
    .card.matched .card-front { display: flex; }
    .card.matched .card-back { display: none; }
    .card-emoji { font-size: 22px; }
    .card-label { font-size: 10px; font-weight: 600; color: #555; margin-top: 3px; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .wrong { animation: shake 0.4s; }

    .btn { background: #534AB7; color: white; border: none; border-radius: 8px; padding: 11px 22px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 14px; }
    .btn:hover { background: #3C3489; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal { background: white; border-radius: 16px; padding: 24px; max-width: 500px; width: 100%; }
    .modal-who { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-bottom: 10px; }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #1a1a1a; }
    .choice-btn { width: 100%; text-align: left; padding: 12px 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 13px; line-height: 1.6; color: #1a1a1a; }
    .choice-btn:hover:not(:disabled) { background: #f5f5f5; border-color: #7F77DD; }
    .feedback { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 8px; }
    .fb-ok { background: #E1F5EE; color: #085041; border: 1px solid #1D9E75; }
    .fb-fail { background: #FCEBEB; color: #791F1F; border: 1px solid #E24B4A; }
    .choice-ok { background: #E1F5EE !important; border-color: #1D9E75 !important; }
    .choice-fail { background: #FCEBEB !important; border-color: #E24B4A !important; }
    .hint-box { font-size: 12px; color: #666; background: #FFFDE7; border: 1px solid #FDD835; border-radius: 8px; padding: 8px 12px; margin-top: 8px; }

    /* Win screen */
    .win-screen { text-align: center; padding: 20px 0; }
    .win-emoji { font-size: 56px; }
    .win-screen h2 { font-size: 22px; margin: 10px 0; }
    .score-compare { display: flex; gap: 12px; justify-content: center; margin: 16px 0; }
    .score-box { border-radius: 12px; padding: 14px 28px; }
    .score-box .num { font-size: 34px; font-weight: 700; }
    .score-box .lbl { font-size: 13px; margin-top: 2px; }
    .s1box { background: #EEEDFE; color: #3C3489; }
    .s2box { background: #E1F5EE; color: #085041; }
    .winner-highlight { outline: 3px solid gold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">
  <h1>🃏 Komma-Memory</h1>
  <p class="subtitle">Wer findet die meisten Paare mit richtigen Kommas?</p>

  <!-- Setup -->
  <div id="setupScreen" class="setup-screen">
    <label>Name Spieler 1</label>
    <input type="text" id="name1" placeholder="Spieler 1" maxlength="20">
    <label>Name Spieler 2</label>
    <input type="text" id="name2" placeholder="Spieler 2" maxlength="20">
    <div class="divider"></div>
    <label>Kategorien auswählen (mindestens eine)</label>
    <div class="cat-grid">
      <button class="cat-btn active" data-cat="aufzaehlung" onclick="toggleCat(this)">📋 Aufzählungen</button>
      <button class="cat-btn active" data-cat="nebensatz" onclick="toggleCat(this)">🔗 Nebensätze</button>
      <button class="cat-btn active" data-cat="einschub" onclick="toggleCat(this)">📎 Einschubsätze</button>
      <button class="cat-btn active" data-cat="rede" onclick="toggleCat(this)">💬 Direkte Rede</button>
    </div>
    <p class="cat-note">Es werden 8 zufällige Paare aus den gewählten Kategorien gespielt.</p>
    <br>
    <button class="btn" onclick="startGame()">Spiel starten</button>
  </div>

  <!-- Spielfeld -->
  <div id="gameArea" class="hidden">
    <!-- BIG TURN DISPLAY -->
    <div class="turn-display turn-p1" id="turnDisplay">
      <div class="arrow" id="turnArrow">▶</div>
      <div class="turn-info">
        <div class="turn-label">Jetzt dran</div>
        <div class="turn-name" id="turnName">Spieler 1</div>
        <div class="turn-extra" id="turnExtra">Deck zwei Karten auf!</div>
      </div>
      <div class="turn-score" id="turnScoreBig">0</div>
    </div>

    <!-- Mini score bar -->
    <div class="player-bar">
      <div class="player-card pc1" id="p1card">
        <h4 id="p1name">Spieler 1</h4>
        <p><span id="p1score">0</span> Paare</p>
      </div>
      <div class="player-card pc2" id="p2card">
        <h4 id="p2name">Spieler 2</h4>
        <p><span id="p2score">0</span> Paare</p>
      </div>
    </div>

    <div class="memory-grid" id="grid"></div>
  </div>

  <!-- Gewinner -->
  <div id="winScreen" class="win-screen hidden">
    <div class="win-emoji" id="winEmoji">🏆</div>
    <h2 id="winTitle"></h2>
    <div class="score-compare">
      <div class="score-box s1box" id="winBox1">
        <div class="num" id="wScore1">0</div>
        <div class="lbl" id="wName1">Spieler 1</div>
      </div>
      <div class="score-box s2box" id="winBox2">
        <div class="num" id="wScore2">0</div>
        <div class="lbl" id="wName2">Spieler 2</div>
      </div>
    </div>
    <button class="btn" onclick="resetAll()">Nochmal spielen</button>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-who" id="modalWho"></div>
    <div id="modalCatTag" class="cat-tag"></div>
    <h3>Welcher Satz hat das Komma richtig gesetzt?</h3>
    <div id="modalA"></div>
    <div id="modalB"></div>
    <div id="modalFeedback" class="feedback hidden"></div>
    <div id="modalHint" class="hint-box hidden"></div>
    <button id="modalOk" class="btn hidden" onclick="closeModal()">Weiter</button>
  </div>
</div>

<script>
const ALL_SENTENCES = {
  aufzaehlung: {
    label:"Aufzählung", emoji:"📋", color:"#FFF3E0", textColor:"#7C4700",
    pairs:[
      {id:"a1",right:"Ich esse Äpfel, Birnen und Kirschen.",wrong:"Ich esse Äpfel Birnen, und Kirschen.",hint:"Bei Aufzählungen steht das Komma zwischen den Gliedern, aber nicht vor 'und'."},
      {id:"a2",right:"Er kauft Brot, Milch und Butter.",wrong:"Er kauft Brot Milch, und Butter.",hint:"Komma trennt die Aufzählungsglieder – nie vor 'und'."},
      {id:"a3",right:"Wir spielen Fußball, Tennis und Basketball.",wrong:"Wir spielen Fußball Tennis, und Basketball.",hint:"Jedes Glied wird durch ein Komma getrennt, außer vor 'und'."},
      {id:"a4",right:"Sie hat Bleistifte, Hefte und Bücher dabei.",wrong:"Sie hat Bleistifte Hefte, und Bücher dabei.",hint:"Komma zwischen alle Aufzählungsglieder, aber nicht vor 'und'."},
      {id:"a5",right:"Im Korb liegen Tomaten, Gurken und Paprika.",wrong:"Im Korb liegen Tomaten Gurken, und Paprika.",hint:"Das Komma steht zwischen den einzelnen Aufzählungsgliedern."},
      {id:"a6",right:"Wir sehen Berge, Wälder und Seen.",wrong:"Wir sehen Berge Wälder, und Seen.",hint:"Aufzählungen: Komma zwischen den Gliedern, nicht vor 'und'."},
      {id:"a7",right:"Das Kind malt, singt und tanzt.",wrong:"Das Kind malt singt, und tanzt.",hint:"Auch Verben in einer Aufzählung werden durch Komma getrennt."},
      {id:"a8",right:"Er liest Bücher, Zeitungen und Briefe.",wrong:"Er liest Bücher Zeitungen, und Briefe.",hint:"Komma zwischen jedem Aufzählungsglied, nie vor 'und'."},
      {id:"a9",right:"Ich mag Hunde, Katzen und Vögel.",wrong:"Ich mag Hunde Katzen, und Vögel.",hint:"Das Komma steht zwischen den Gliedern, nicht vor 'und'."},
      {id:"a10",right:"Sie packt Kleidung, Bücher und Spielzeug ein.",wrong:"Sie packt Kleidung Bücher, und Spielzeug ein.",hint:"Bei Aufzählungen: Komma zwischen die Glieder, nicht vor 'und'."},
    ]
  },
  nebensatz: {
    label:"Nebensatz", emoji:"🔗", color:"#E3F2FD", textColor:"#0D47A1",
    pairs:[
      {id:"n1",right:"Wenn es regnet, bleiben wir drinnen.",wrong:"Wenn es regnet bleiben, wir drinnen.",hint:"Nebensätze mit 'wenn' werden durch ein Komma vom Hauptsatz getrennt."},
      {id:"n2",right:"Obwohl es kalt war, gingen wir spazieren.",wrong:"Obwohl es kalt war gingen, wir spazieren.",hint:"Das Komma steht am Ende des Nebensatzes, vor dem Hauptsatz."},
      {id:"n3",right:"Weil er müde war, schlief er früh ein.",wrong:"Weil er müde war schlief, er früh ein.",hint:"Nebensätze mit 'weil' enden mit einem Komma."},
      {id:"n4",right:"Als die Sonne schien, spielten wir draußen.",wrong:"Als die Sonne schien spielten, wir draußen.",hint:"'Als' leitet einen Nebensatz ein – Komma am Ende des Nebensatzes."},
      {id:"n5",right:"Da er krank war, blieb er zu Hause.",wrong:"Da er krank war blieb, er zu Hause.",hint:"Nebensatz mit 'da' – Komma trennt Neben- und Hauptsatz."},
      {id:"n6",right:"Ich lerne Deutsch, weil es wichtig ist.",wrong:"Ich lerne Deutsch weil, es wichtig ist.",hint:"Folgt der Nebensatz dem Hauptsatz, steht das Komma vor dem Nebensatzanfang."},
      {id:"n7",right:"Er aß nichts, obwohl er Hunger hatte.",wrong:"Er aß nichts obwohl, er Hunger hatte.",hint:"Komma steht vor dem einleitenden Wort des Nebensatzes."},
      {id:"n8",right:"Nachdem wir gegessen hatten, räumten wir auf.",wrong:"Nachdem wir gegessen hatten räumten, wir auf.",hint:"'Nachdem' leitet einen Nebensatz ein – Komma nach dem Nebensatz."},
      {id:"n9",right:"Sobald der Film beginnt, wird es still.",wrong:"Sobald der Film beginnt wird, es still.",hint:"Komma nach dem vollständigen Nebensatz, vor dem Hauptsatz."},
      {id:"n10",right:"Er hilft ihr, damit sie es schafft.",wrong:"Er hilft ihr damit, sie es schafft.",hint:"'Damit' als Konjunktion: Komma vor 'damit'."},
    ]
  },
  einschub: {
    label:"Einschubsatz", emoji:"📎", color:"#F3E5F5", textColor:"#4A148C",
    pairs:[
      {id:"e1",right:"Die Katze, die auf dem Sofa liegt, schläft.",wrong:"Die Katze die auf dem Sofa liegt schläft.",hint:"Eingeschobene Relativsätze werden vorne und hinten durch Komma abgetrennt."},
      {id:"e2",right:"Die Blumen, die im Garten stehen, duften schön.",wrong:"Die Blumen die im Garten stehen duften, schön.",hint:"Relativsätze mit 'die/der/das' brauchen ein Komma am Anfang und am Ende."},
      {id:"e3",right:"Meine Freunde, Tim und Lea, kommen heute.",wrong:"Meine Freunde Tim, und Lea kommen heute.",hint:"Erläuternde Einschübe werden von beiden Seiten durch Komma begrenzt."},
      {id:"e4",right:"Der Hund, der so laut bellt, gehört uns.",wrong:"Der Hund der so laut bellt gehört, uns.",hint:"Relativsatz: Komma vor 'der/die/das' und nach dem Ende des Relativsatzes."},
      {id:"e5",right:"Das Buch, das ich lese, ist sehr spannend.",wrong:"Das Buch das ich lese ist, sehr spannend.",hint:"Eingeschobene Relativsätze brauchen zwei Kommas."},
      {id:"e6",right:"Mein Lehrer, Herr Müller, erklärt es gut.",wrong:"Mein Lehrer Herr Müller, erklärt es gut.",hint:"Beifügungen (Appositionen) werden beidseitig durch Komma abgetrennt."},
      {id:"e7",right:"Das Mädchen, das singt, heißt Anna.",wrong:"Das Mädchen das singt heißt, Anna.",hint:"Relativsatz eingeschoben: Komma vor und nach dem Relativsatz."},
      {id:"e8",right:"Der Zug, der um 8 Uhr fährt, ist voll.",wrong:"Der Zug der um 8 Uhr fährt ist, voll.",hint:"Eingeschobene Relativsätze werden immer beidseitig durch Komma abgegrenzt."},
      {id:"e9",right:"Das Haus, in dem wir wohnen, ist alt.",wrong:"Das Haus in dem wir wohnen ist, alt.",hint:"Auch Relativsätze mit 'in dem / auf dem' brauchen zwei Kommas."},
      {id:"e10",right:"Meine Schwester, die Ärztin ist, wohnt hier.",wrong:"Meine Schwester die Ärztin ist, wohnt hier.",hint:"Relativsatz als Einschub: beidseitig Komma setzen."},
    ]
  },
  rede: {
    label:"Direkte Rede", emoji:"💬", color:"#E8F5E9", textColor:"#1B5E20",
    pairs:[
      {id:"r1",right:'Er sagt: „Ich komme gleich."',wrong:'Er sagt „Ich komme gleich."',hint:"Vor direkter Rede steht ein Doppelpunkt nach dem Begleitsatz."},
      {id:"r2",right:'„Komm her!", rief sie laut.',wrong:'„Komm her!" rief, sie laut.',hint:"Nach dem Ausrufezeichen in der direkten Rede steht ein Komma vor dem Begleitsatz."},
      {id:"r3",right:'„Ich bin müde", sagte er leise.',wrong:'„Ich bin müde" sagte, er leise.',hint:"Nach dem schließenden Anführungszeichen steht ein Komma vor dem Begleitsatz."},
      {id:"r4",right:'Sie fragte: „Wo bist du?"',wrong:'Sie fragte „Wo bist du?"',hint:"Vor direkter Rede steht immer ein Doppelpunkt nach dem Begleitsatz."},
      {id:"r5",right:'„Wir gehen jetzt", erklärte die Lehrerin.',wrong:'„Wir gehen jetzt" erklärte, die Lehrerin.',hint:"Nach der direkten Rede kommt ein Komma, dann folgt der Begleitsatz."},
      {id:"r6",right:'„Toll!", rief das Kind begeistert.',wrong:'„Toll!" rief das Kind, begeistert.',hint:"Nach '!' in der direkten Rede folgt ein Komma vor dem Begleitsatz."},
      {id:"r7",right:'Mama sagt: „Bitte aufräumen!"',wrong:'Mama sagt „Bitte aufräumen!"',hint:"Doppelpunkt vor direkter Rede darf nicht fehlen."},
      {id:"r8",right:'„Schön hier", meinte er zufrieden.',wrong:'„Schön hier" meinte, er zufrieden.',hint:"Nach der direkten Rede steht ein Komma, dann der Begleitsatz."},
      {id:"r9",right:'Er rief: „Hilfe, ich falle!"',wrong:'Er rief „Hilfe, ich falle!"',hint:"Doppelpunkt nach dem Begleitsatz, dann folgt die direkte Rede."},
      {id:"r10",right:'„Das war schön", sagte sie lächelnd.',wrong:'„Das war schön" sagte, sie lächelnd.',hint:"Komma nach dem schließenden Anführungszeichen – nicht nach 'sagte'."},
    ]
  }
};

const PAIRS_PER_GAME = 8;
let activeCats = new Set(['aufzaehlung','nebensatz','einschub','rede']);
let st = {}, pendingPair = null, locked = false;

function toggleCat(btn) {
  const cat = btn.dataset.cat;
  if (activeCats.has(cat) && activeCats.size === 1) return;
  if (activeCats.has(cat)) { activeCats.delete(cat); btn.classList.remove('active'); }
  else { activeCats.add(cat); btn.classList.add('active'); }
}

function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

function startGame() {
  const n1 = document.getElementById('name1').value.trim() || 'Spieler 1';
  const n2 = document.getElementById('name2').value.trim() || 'Spieler 2';
  let pool = [];
  activeCats.forEach(cat => {
    ALL_SENTENCES[cat].pairs.forEach(p => {
      pool.push({...p, cat, catLabel: ALL_SENTENCES[cat].label, emoji: ALL_SENTENCES[cat].emoji, color: ALL_SENTENCES[cat].color, textColor: ALL_SENTENCES[cat].textColor});
    });
  });
  const picked = shuffle(pool).slice(0, PAIRS_PER_GAME);
  const cards = [];
  picked.forEach(s => {
    cards.push({uid:`${s.id}-A`, pairId:s.id, emoji:s.emoji, topic:s.catLabel, color:s.color, textColor:s.textColor, sentence:s.right, isRight:true, hint:s.hint});
    cards.push({uid:`${s.id}-B`, pairId:s.id, emoji:s.emoji, topic:s.catLabel, color:s.color, textColor:s.textColor, sentence:s.wrong, isRight:false, hint:s.hint});
  });
  st = {cards:shuffle(cards), flipped:[], matched:{}, current:1, scores:{1:0,2:0}, names:{1:n1,2:n2}, pairs:picked.length, bonus:false};
  pendingPair = null; locked = false;
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameArea').classList.remove('hidden');
  document.getElementById('p1name').textContent = n1;
  document.getElementById('p2name').textContent = n2;
  document.getElementById('p1score').textContent = 0;
  document.getElementById('p2score').textContent = 0;
  updateTurnUI(false); renderGrid();
}

function updateTurnUI(isBonus) {
  const c = st.current;
  const disp = document.getElementById('turnDisplay');
  disp.className = 'turn-display ' + (c === 1 ? 'turn-p1' : 'turn-p2');
  document.getElementById('turnName').textContent = st.names[c];
  document.getElementById('turnScoreBig').textContent = st.scores[c];
  if (isBonus) {
    document.getElementById('turnExtra').textContent = '🎉 Nochmal! Bonus-Zug!';
    disp.classList.add('bonus-pulse');
    setTimeout(() => disp.classList.remove('bonus-pulse'), 500);
  } else {
    document.getElementById('turnExtra').textContent = 'Deck zwei Karten auf!';
  }
  document.getElementById('p1card').className = 'player-card pc1' + (c === 1 ? '' : ' inactive');
  document.getElementById('p2card').className = 'player-card pc2' + (c === 2 ? '' : ' inactive');
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const bgBack = st.current === 1 ? '#EEEDFE' : '#E1F5EE';
  st.cards.forEach(card => {
    const owner = st.matched[card.pairId];
    const isMatched = !!owner;
    const isFlipped = !!st.flipped.find(f => f.uid === card.uid);
    const el = document.createElement('div');
    el.className = 'card' + (isMatched ? ' matched flipped' : '') + (isFlipped ? ' flipped' : '');
    el.dataset.uid = card.uid;
    if (isMatched) {
      el.style.background = owner === 1 ? '#EEEDFE' : '#E1F5EE';
      el.style.borderColor = owner === 1 ? '#7F77DD' : '#1D9E75';
      el.style.borderWidth = '2px';
    }
    el.innerHTML = `
      <div class="card-back" style="background:${bgBack}"><span style="font-size:26px">?</span></div>
      <div class="card-front" style="background:${card.color}30">
        <span class="card-emoji">${card.emoji}</span>
        <span class="card-label">${card.topic}</span>
      </div>`;
    if (!isMatched) el.onclick = () => flipCard(card.uid);
    grid.appendChild(el);
  });
}

function flipCard(uid) {
  if (locked || st.flipped.length >= 2 || st.flipped.find(f => f.uid === uid)) return;
  const card = st.cards.find(c => c.uid === uid);
  st.flipped.push(card);
  const els = document.querySelectorAll('.card');
  st.cards.forEach((c, i) => { if (c.uid === uid) els[i].classList.add('flipped'); });
  if (st.flipped.length === 2) { locked = true; setTimeout(checkPair, 600); }
}

function checkPair() {
  const [a, b] = st.flipped;
  if (a.pairId === b.pairId) {
    pendingPair = {a, b}; showModal();
  } else {
    const els = document.querySelectorAll('.card');
    st.cards.forEach((c, i) => { if (c.uid === a.uid || c.uid === b.uid) els[i].classList.add('wrong'); });
    setTimeout(() => {
      st.cards.forEach((c, i) => { if (c.uid === a.uid || c.uid === b.uid) els[i].classList.remove('wrong', 'flipped'); });
      st.flipped = [];
      st.bonus = false;
      // Wrong pair → switch player
      st.current = st.current === 1 ? 2 : 1;
      updateTurnUI(false); renderGrid(); locked = false;
    }, 700);
  }
}

function showModal() {
  const c = st.current;
  const col = c === 1 ? {bg:'#EEEDFE', txt:'#3C3489'} : {bg:'#E1F5EE', txt:'#085041'};
  const who = document.getElementById('modalWho');
  who.textContent = `${st.names[c]} wählt`;
  who.style.background = col.bg; who.style.color = col.txt;
  const cardData = st.cards.find(x => x.uid === pendingPair.a.uid);
  const tag = document.getElementById('modalCatTag');
  tag.textContent = `${cardData.emoji} ${cardData.topic}`;
  tag.style.background = cardData.color; tag.style.color = cardData.textColor;
  document.getElementById('modalFeedback').classList.add('hidden');
  document.getElementById('modalHint').classList.add('hidden');
  document.getElementById('modalOk').classList.add('hidden');
  const sA = st.cards.find(c => c.uid === pendingPair.a.uid);
  const sB = st.cards.find(c => c.uid === pendingPair.b.uid);
  const order = Math.random() < 0.5 ? [sA, sB] : [sB, sA];
  ['modalA','modalB'].forEach((id, i) => {
    const s = order[i];
    const d = document.createElement('button');
    d.className = 'choice-btn';
    d.innerHTML = `<strong style="color:#888;margin-right:8px">${i === 0 ? 'A' : 'B'}.</strong>${s.sentence}`;
    d.onclick = () => chooseAnswer(s.isRight, d, s.hint);
    document.getElementById(id).innerHTML = '';
    document.getElementById(id).appendChild(d);
  });
  document.getElementById('modal').classList.remove('hidden');
}

function chooseAnswer(isRight, btn, hint) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const fb = document.getElementById('modalFeedback');
  const hintEl = document.getElementById('modalHint');
  fb.classList.remove('hidden');
  if (isRight) {
    btn.classList.add('choice-ok');
    fb.textContent = `✓ Richtig! Punkt für ${st.names[st.current]}! 🎉 Nochmal aufdecken!`;
    fb.className = 'feedback fb-ok';
    st.matched[pendingPair.a.pairId] = st.current;
    st.scores[st.current]++;
    document.getElementById(`p${st.current}score`).textContent = st.scores[st.current];
    document.getElementById('turnScoreBig').textContent = st.scores[st.current];
    st.bonus = true;
    document.getElementById('modalOk').textContent = 'Nochmal aufdecken! ▶';
  } else {
    btn.classList.add('choice-fail');
    fb.textContent = '✗ Leider falsch! Das Paar kommt nochmal.';
    fb.className = 'feedback fb-fail';
    hintEl.textContent = '💡 Tipp: ' + hint;
    hintEl.classList.remove('hidden');
    st.bonus = false;
    document.getElementById('modalOk').textContent = 'Paar zurücklegen';
  }
  document.getElementById('modalOk').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  const gotBonus = st.bonus;
  st.flipped = [];
  if (gotBonus) {
    // Richtige Antwort → gleicher Spieler bleibt dran (Bonus-Zug)
    // kein Wechsel
  } else {
    // Falsche Satzwahl → Spieler wechseln
    st.current = st.current === 1 ? 2 : 1;
  }
  pendingPair = null;
  st.bonus = false;
  updateTurnUI(gotBonus);
  renderGrid();
  locked = false;
  if (Object.keys(st.matched).length === st.pairs) setTimeout(showWin, 300);
}

function showWin() {
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('winScreen').classList.remove('hidden');
  const s1 = st.scores[1], s2 = st.scores[2];
  document.getElementById('winEmoji').textContent = s1 === s2 ? '🤝' : '🏆';
  document.getElementById('winTitle').textContent = s1 > s2 ? `${st.names[1]} gewinnt!` : s2 > s1 ? `${st.names[2]} gewinnt!` : 'Unentschieden!';
  document.getElementById('wScore1').textContent = s1;
  document.getElementById('wName1').textContent = st.names[1];
  document.getElementById('wScore2').textContent = s2;
  document.getElementById('wName2').textContent = st.names[2];
  document.getElementById('winBox1').classList.toggle('winner-highlight', s1 > s2);
  document.getElementById('winBox2').classList.toggle('winner-highlight', s2 > s1);
}

function resetAll() {
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('setupScreen').classList.remove('hidden');
}
</script>
</body>
