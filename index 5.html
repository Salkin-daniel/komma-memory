<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komma-Memory – Klasse 5</title>
</head>
<body style="margin:0;padding:20px;font-family:Arial,sans-serif;background:#f0f0f0;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;">

<div style="background:white;border-radius:16px;padding:24px;max-width:780px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.1);">

  <h1 style="font-size:22px;font-weight:700;margin:0 0 4px;color:#1a1a1a;">🃏 Komma-Memory</h1>
  <p style="font-size:14px;color:#666;margin:0 0 20px;">Wer findet die meisten Paare mit richtigen Kommas?</p>

  <!-- SETUP -->
  <div id="setupScreen">
    <label style="display:block;font-size:13px;color:#555;margin-bottom:4px;">Name Spieler 1</label>
    <input id="name1" type="text" placeholder="Spieler 1" maxlength="20"
      style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;box-sizing:border-box;outline:none;">
    <label style="display:block;font-size:13px;color:#555;margin-bottom:4px;">Name Spieler 2</label>
    <input id="name2" type="text" placeholder="Spieler 2" maxlength="20"
      style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px;box-sizing:border-box;outline:none;">

    <hr style="border:none;border-top:1px solid #eee;margin:0 0 16px;">
    <p style="font-size:13px;color:#555;margin:0 0 8px;font-weight:600;">Kategorien auswählen:</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <button class="catBtn" data-cat="aufzaehlung" onclick="toggleCat(this)"
        style="padding:10px 12px;border-radius:10px;border:2px solid #534AB7;background:#EEEDFE;cursor:pointer;font-size:13px;text-align:left;color:#3C3489;font-weight:600;">📋 Aufzählungen</button>
      <button class="catBtn" data-cat="nebensatz" onclick="toggleCat(this)"
        style="padding:10px 12px;border-radius:10px;border:2px solid #534AB7;background:#EEEDFE;cursor:pointer;font-size:13px;text-align:left;color:#3C3489;font-weight:600;">🔗 Nebensätze</button>
      <button class="catBtn" data-cat="einschub" onclick="toggleCat(this)"
        style="padding:10px 12px;border-radius:10px;border:2px solid #534AB7;background:#EEEDFE;cursor:pointer;font-size:13px;text-align:left;color:#3C3489;font-weight:600;">📎 Einschubsätze</button>
      <button class="catBtn" data-cat="rede" onclick="toggleCat(this)"
        style="padding:10px 12px;border-radius:10px;border:2px solid #534AB7;background:#EEEDFE;cursor:pointer;font-size:13px;text-align:left;color:#3C3489;font-weight:600;">💬 Direkte Rede</button>
    </div>
    <p style="font-size:12px;color:#888;margin:0 0 16px;">Es werden 8 zufällige Paare gespielt.</p>
    <button onclick="startGame()"
      style="background:#534AB7;color:white;border:none;border-radius:8px;padding:12px 24px;cursor:pointer;font-size:14px;font-weight:700;">▶ Spiel starten</button>
  </div>

  <!-- SPIELFELD -->
  <div id="gameArea" style="display:none;">
    <!-- BIG TURN BANNER -->
    <div id="turnBanner"
      style="border-radius:16px;padding:18px 22px;margin-bottom:14px;display:flex;align-items:center;gap:16px;background:#EEEDFE;border:2px solid #7F77DD;">
      <div style="font-size:32px;">▶</div>
      <div style="flex:1;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:0.6;color:#3C3489;">Jetzt dran</div>
        <div id="turnName" style="font-size:30px;font-weight:700;color:#3C3489;line-height:1.1;">Spieler 1</div>
        <div id="turnExtra" style="font-size:13px;color:#3C3489;opacity:0.75;margin-top:3px;">Deck zwei Karten auf!</div>
      </div>
      <div id="turnScoreBig" style="font-size:40px;font-weight:700;opacity:0.2;color:#3C3489;">0</div>
    </div>

    <!-- MINI SCORE -->
    <div style="display:flex;gap:10px;margin-bottom:14px;">
      <div id="p1card" style="flex:1;background:#EEEDFE;border:2px solid #7F77DD;border-radius:12px;padding:10px 14px;">
        <div id="p1name" style="font-size:13px;font-weight:700;color:#3C3489;margin-bottom:2px;">Spieler 1</div>
        <div style="font-size:13px;color:#555;"><span id="p1score">0</span> Paare</div>
      </div>
      <div id="p2card" style="flex:1;background:#E1F5EE;border:2px solid #1D9E75;border-radius:12px;padding:10px 14px;opacity:0.4;">
        <div id="p2name" style="font-size:13px;font-weight:700;color:#085041;margin-bottom:2px;">Spieler 2</div>
        <div style="font-size:13px;color:#555;"><span id="p2score">0</span> Paare</div>
      </div>
    </div>

    <!-- GRID -->
    <div id="grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;"></div>
  </div>

  <!-- GEWINNER -->
  <div id="winScreen" style="display:none;text-align:center;padding:20px 0;">
    <div id="winEmoji" style="font-size:60px;">🏆</div>
    <h2 id="winTitle" style="font-size:24px;font-weight:700;margin:10px 0;color:#1a1a1a;"></h2>
    <div style="display:flex;gap:12px;justify-content:center;margin:16px 0;">
      <div id="winBox1" style="background:#EEEDFE;color:#3C3489;border-radius:12px;padding:14px 28px;">
        <div id="wScore1" style="font-size:36px;font-weight:700;">0</div>
        <div id="wName1" style="font-size:13px;margin-top:2px;">Spieler 1</div>
      </div>
      <div id="winBox2" style="background:#E1F5EE;color:#085041;border-radius:12px;padding:14px 28px;">
        <div id="wScore2" style="font-size:36px;font-weight:700;">0</div>
        <div id="wName2" style="font-size:13px;margin-top:2px;">Spieler 2</div>
      </div>
    </div>
    <button onclick="resetAll()"
      style="background:#534AB7;color:white;border:none;border-radius:8px;padding:12px 24px;cursor:pointer;font-size:14px;font-weight:700;margin-top:8px;">🔄 Nochmal spielen</button>
  </div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;">
  <div style="background:white;border-radius:16px;padding:24px;max-width:500px;width:100%;">
    <div id="modalWho" style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:8px;background:#EEEDFE;color:#3C3489;"></div>
    <div id="modalCatTag" style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;margin-left:6px;"></div>
    <h3 style="font-size:15px;font-weight:700;margin:0 0 14px;color:#1a1a1a;">Welcher Satz hat das Komma richtig gesetzt?</h3>
    <div id="modalA"></div>
    <div id="modalB"></div>
    <div id="modalFeedback" style="display:none;font-size:13px;padding:10px 14px;border-radius:8px;margin-top:8px;"></div>
    <div id="modalHint" style="display:none;font-size:12px;color:#666;background:#FFFDE7;border:1px solid #FDD835;border-radius:8px;padding:8px 12px;margin-top:8px;"></div>
    <button id="modalOk" onclick="closeModal()"
      style="display:none;background:#534AB7;color:white;border:none;border-radius:8px;padding:11px 22px;cursor:pointer;font-size:14px;font-weight:700;margin-top:14px;">Weiter</button>
  </div>
</div>

<script>
const ALL = {
  aufzaehlung:{label:"Aufzählung",emoji:"📋",color:"#FFF3E0",tc:"#7C4700",pairs:[
    {id:"a1",r:"Ich esse Äpfel, Birnen und Kirschen.",w:"Ich esse Äpfel Birnen, und Kirschen.",h:"Bei Aufzählungen steht das Komma zwischen den Gliedern, aber nicht vor 'und'."},
    {id:"a2",r:"Er kauft Brot, Milch und Butter.",w:"Er kauft Brot Milch, und Butter.",h:"Komma trennt die Aufzählungsglieder – nie vor 'und'."},
    {id:"a3",r:"Wir spielen Fußball, Tennis und Basketball.",w:"Wir spielen Fußball Tennis, und Basketball.",h:"Jedes Glied wird durch ein Komma getrennt, außer vor 'und'."},
    {id:"a4",r:"Sie hat Bleistifte, Hefte und Bücher dabei.",w:"Sie hat Bleistifte Hefte, und Bücher dabei.",h:"Komma zwischen alle Aufzählungsglieder, aber nicht vor 'und'."},
    {id:"a5",r:"Im Korb liegen Tomaten, Gurken und Paprika.",w:"Im Korb liegen Tomaten Gurken, und Paprika.",h:"Das Komma steht zwischen den einzelnen Aufzählungsgliedern."},
    {id:"a6",r:"Wir sehen Berge, Wälder und Seen.",w:"Wir sehen Berge Wälder, und Seen.",h:"Aufzählungen: Komma zwischen den Gliedern, nicht vor 'und'."},
    {id:"a7",r:"Das Kind malt, singt und tanzt.",w:"Das Kind malt singt, und tanzt.",h:"Auch Verben in einer Aufzählung werden durch Komma getrennt."},
    {id:"a8",r:"Er liest Bücher, Zeitungen und Briefe.",w:"Er liest Bücher Zeitungen, und Briefe.",h:"Komma zwischen jedem Aufzählungsglied, nie vor 'und'."},
    {id:"a9",r:"Ich mag Hunde, Katzen und Vögel.",w:"Ich mag Hunde Katzen, und Vögel.",h:"Das Komma steht zwischen den Gliedern, nicht vor 'und'."},
    {id:"a10",r:"Sie packt Kleidung, Bücher und Spielzeug ein.",w:"Sie packt Kleidung Bücher, und Spielzeug ein.",h:"Bei Aufzählungen: Komma zwischen die Glieder, nicht vor 'und'."},
  ]},
  nebensatz:{label:"Nebensatz",emoji:"🔗",color:"#E3F2FD",tc:"#0D47A1",pairs:[
    {id:"n1",r:"Wenn es regnet, bleiben wir drinnen.",w:"Wenn es regnet bleiben, wir drinnen.",h:"Nebensätze mit 'wenn' werden durch ein Komma vom Hauptsatz getrennt."},
    {id:"n2",r:"Obwohl es kalt war, gingen wir spazieren.",w:"Obwohl es kalt war gingen, wir spazieren.",h:"Das Komma steht am Ende des Nebensatzes, vor dem Hauptsatz."},
    {id:"n3",r:"Weil er müde war, schlief er früh ein.",w:"Weil er müde war schlief, er früh ein.",h:"Nebensätze mit 'weil' enden mit einem Komma."},
    {id:"n4",r:"Als die Sonne schien, spielten wir draußen.",w:"Als die Sonne schien spielten, wir draußen.",h:"'Als' leitet einen Nebensatz ein – Komma am Ende des Nebensatzes."},
    {id:"n5",r:"Da er krank war, blieb er zu Hause.",w:"Da er krank war blieb, er zu Hause.",h:"Nebensatz mit 'da' – Komma trennt Neben- und Hauptsatz."},
    {id:"n6",r:"Ich lerne Deutsch, weil es wichtig ist.",w:"Ich lerne Deutsch weil, es wichtig ist.",h:"Folgt der Nebensatz dem Hauptsatz, steht das Komma vor dem Nebensatzanfang."},
    {id:"n7",r:"Er aß nichts, obwohl er Hunger hatte.",w:"Er aß nichts obwohl, er Hunger hatte.",h:"Komma steht vor dem einleitenden Wort des Nebensatzes."},
    {id:"n8",r:"Nachdem wir gegessen hatten, räumten wir auf.",w:"Nachdem wir gegessen hatten räumten, wir auf.",h:"'Nachdem' leitet einen Nebensatz ein – Komma nach dem Nebensatz."},
    {id:"n9",r:"Sobald der Film beginnt, wird es still.",w:"Sobald der Film beginnt wird, es still.",h:"Komma nach dem vollständigen Nebensatz, vor dem Hauptsatz."},
    {id:"n10",r:"Er hilft ihr, damit sie es schafft.",w:"Er hilft ihr damit, sie es schafft.",h:"'Damit' als Konjunktion: Komma vor 'damit'."},
  ]},
  einschub:{label:"Einschubsatz",emoji:"📎",color:"#F3E5F5",tc:"#4A148C",pairs:[
    {id:"e1",r:"Die Katze, die auf dem Sofa liegt, schläft.",w:"Die Katze die auf dem Sofa liegt schläft.",h:"Eingeschobene Relativsätze werden vorne und hinten durch Komma abgetrennt."},
    {id:"e2",r:"Die Blumen, die im Garten stehen, duften schön.",w:"Die Blumen die im Garten stehen duften, schön.",h:"Relativsätze mit 'die/der/das' brauchen ein Komma am Anfang und am Ende."},
    {id:"e3",r:"Meine Freunde, Tim und Lea, kommen heute.",w:"Meine Freunde Tim, und Lea kommen heute.",h:"Erläuternde Einschübe werden von beiden Seiten durch Komma begrenzt."},
    {id:"e4",r:"Der Hund, der so laut bellt, gehört uns.",w:"Der Hund der so laut bellt gehört, uns.",h:"Relativsatz: Komma vor 'der/die/das' und nach dem Ende des Relativsatzes."},
    {id:"e5",r:"Das Buch, das ich lese, ist sehr spannend.",w:"Das Buch das ich lese ist, sehr spannend.",h:"Eingeschobene Relativsätze brauchen zwei Kommas."},
    {id:"e6",r:"Mein Lehrer, Herr Müller, erklärt es gut.",w:"Mein Lehrer Herr Müller, erklärt es gut.",h:"Beifügungen (Appositionen) werden beidseitig durch Komma abgetrennt."},
    {id:"e7",r:"Das Mädchen, das singt, heißt Anna.",w:"Das Mädchen das singt heißt, Anna.",h:"Relativsatz eingeschoben: Komma vor und nach dem Relativsatz."},
    {id:"e8",r:"Der Zug, der um 8 Uhr fährt, ist voll.",w:"Der Zug der um 8 Uhr fährt ist, voll.",h:"Eingeschobene Relativsätze werden immer beidseitig durch Komma abgegrenzt."},
    {id:"e9",r:"Das Haus, in dem wir wohnen, ist alt.",w:"Das Haus in dem wir wohnen ist, alt.",h:"Auch Relativsätze mit 'in dem / auf dem' brauchen zwei Kommas."},
    {id:"e10",r:"Meine Schwester, die Ärztin ist, wohnt hier.",w:"Meine Schwester die Ärztin ist, wohnt hier.",h:"Relativsatz als Einschub: beidseitig Komma setzen."},
  ]},
  rede:{label:"Direkte Rede",emoji:"💬",color:"#E8F5E9",tc:"#1B5E20",pairs:[
    {id:"r1",r:'Er sagt: „Ich komme gleich."',w:'Er sagt „Ich komme gleich."',h:"Vor direkter Rede steht ein Doppelpunkt nach dem Begleitsatz."},
    {id:"r2",r:'„Komm her!", rief sie laut.',w:'„Komm her!" rief, sie laut.',h:"Nach dem Ausrufezeichen in der direkten Rede steht ein Komma vor dem Begleitsatz."},
    {id:"r3",r:'„Ich bin müde", sagte er leise.',w:'„Ich bin müde" sagte, er leise.',h:"Nach dem schließenden Anführungszeichen steht ein Komma vor dem Begleitsatz."},
    {id:"r4",r:'Sie fragte: „Wo bist du?"',w:'Sie fragte „Wo bist du?"',h:"Vor direkter Rede steht immer ein Doppelpunkt nach dem Begleitsatz."},
    {id:"r5",r:'„Wir gehen jetzt", erklärte die Lehrerin.',w:'„Wir gehen jetzt" erklärte, die Lehrerin.',h:"Nach der direkten Rede kommt ein Komma, dann folgt der Begleitsatz."},
    {id:"r6",r:'„Toll!", rief das Kind begeistert.',w:'„Toll!" rief das Kind, begeistert.',h:"Nach '!' in der direkten Rede folgt ein Komma vor dem Begleitsatz."},
    {id:"r7",r:'Mama sagt: „Bitte aufräumen!"',w:'Mama sagt „Bitte aufräumen!"',h:"Doppelpunkt vor direkter Rede darf nicht fehlen."},
    {id:"r8",r:'„Schön hier", meinte er zufrieden.',w:'„Schön hier" meinte, er zufrieden.',h:"Nach der direkten Rede steht ein Komma, dann der Begleitsatz."},
    {id:"r9",r:'Er rief: „Hilfe, ich falle!"',w:'Er rief „Hilfe, ich falle!"',h:"Doppelpunkt nach dem Begleitsatz, dann folgt die direkte Rede."},
    {id:"r10",r:'„Das war schön", sagte sie lächelnd.',w:'„Das war schön" sagte, sie lächelnd.',h:"Komma nach dem schließenden Anführungszeichen – nicht nach 'sagte'."},
  ]}
};

let activeCats = new Set(['aufzaehlung','nebensatz','einschub','rede']);
let st = {}, pendingPair = null, locked = false;

function toggleCat(btn) {
  const cat = btn.dataset.cat;
  if (activeCats.has(cat) && activeCats.size === 1) return;
  if (activeCats.has(cat)) {
    activeCats.delete(cat);
    btn.style.border = '2px solid #ddd';
    btn.style.background = 'white';
    btn.style.color = '#333';
    btn.style.fontWeight = 'normal';
  } else {
    activeCats.add(cat);
    btn.style.border = '2px solid #534AB7';
    btn.style.background = '#EEEDFE';
    btn.style.color = '#3C3489';
    btn.style.fontWeight = '600';
  }
}

function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

function startGame() {
  const n1 = document.getElementById('name1').value.trim() || 'Spieler 1';
  const n2 = document.getElementById('name2').value.trim() || 'Spieler 2';
  let pool = [];
  activeCats.forEach(cat => {
    ALL[cat].pairs.forEach(p => {
      pool.push({...p, catLabel: ALL[cat].label, emoji: ALL[cat].emoji, color: ALL[cat].color, tc: ALL[cat].tc});
    });
  });
  const picked = shuffle(pool).slice(0, 8);
  const cards = [];
  picked.forEach(s => {
    cards.push({uid:`${s.id}-A`, pairId:s.id, emoji:s.emoji, topic:s.catLabel, color:s.color, tc:s.tc, sentence:s.r, isRight:true, hint:s.h});
    cards.push({uid:`${s.id}-B`, pairId:s.id, emoji:s.emoji, topic:s.catLabel, color:s.color, tc:s.tc, sentence:s.w, isRight:false, hint:s.h});
  });
  st = {cards:shuffle(cards), flipped:[], matched:{}, current:1, scores:{1:0,2:0}, names:{1:n1,2:n2}, pairs:picked.length, bonus:false};
  pendingPair = null; locked = false;
  document.getElementById('p1name').textContent = n1;
  document.getElementById('p2name').textContent = n2;
  document.getElementById('p1score').textContent = 0;
  document.getElementById('p2score').textContent = 0;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  updateTurnUI(false);
  renderGrid();
}

function updateTurnUI(isBonus) {
  const c = st.current;
  const isP1 = c === 1;
  const bg = isP1 ? '#EEEDFE' : '#E1F5EE';
  const border = isP1 ? '#7F77DD' : '#1D9E75';
  const col = isP1 ? '#3C3489' : '#085041';
  const banner = document.getElementById('turnBanner');
  banner.style.background = bg;
  banner.style.borderColor = border;
  banner.querySelectorAll('*').forEach(el => el.style.color = col);
  document.getElementById('turnName').textContent = st.names[c];
  document.getElementById('turnName').style.color = col;
  document.getElementById('turnExtra').style.color = col;
  document.getElementById('turnScoreBig').style.color = col;
  document.getElementById('turnScoreBig').textContent = st.scores[c];
  document.getElementById('turnExtra').textContent = isBonus ? '🎉 Richtig! Nochmal aufdecken!' : 'Deck zwei Karten auf!';
  document.getElementById('p1card').style.opacity = isP1 ? '1' : '0.38';
  document.getElementById('p2card').style.opacity = isP1 ? '0.38' : '1';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const bgBack = st.current === 1 ? '#EEEDFE' : '#E1F5EE';
  st.cards.forEach(card => {
    const owner = st.matched[card.pairId];
    const isMatched = !!owner;
    const isFlipped = !!st.flipped.find(f => f.uid === card.uid);
    const el = document.createElement('div');
    el.dataset.uid = card.uid;
    el.style.cssText = `border-radius:12px;aspect-ratio:3/2;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;min-height:75px;background:white;border:${isMatched ? '2px solid '+(owner===1?'#7F77DD':'#1D9E75') : '1px solid #ddd'};${isMatched?(owner===1?'background:#EEEDFE':'background:#E1F5EE'):''}`;

    const back = document.createElement('div');
    back.style.cssText = `position:absolute;inset:0;display:${isFlipped||isMatched?'none':'flex'};flex-direction:column;align-items:center;justify-content:center;border-radius:12px;background:${bgBack};font-size:24px;`;
    back.textContent = '?';

    const front = document.createElement('div');
    front.style.cssText = `position:absolute;inset:0;display:${isFlipped||isMatched?'flex':'none'};flex-direction:column;align-items:center;justify-content:center;border-radius:12px;padding:6px;text-align:center;background:${card.color}44;`;
    front.innerHTML = `<span style="font-size:22px">${card.emoji}</span><span style="font-size:10px;font-weight:700;color:#555;margin-top:3px;">${card.topic}</span>`;

    el.appendChild(back);
    el.appendChild(front);
    if (!isMatched) el.onclick = () => flipCard(card.uid);
    grid.appendChild(el);
  });
}

function flipCard(uid) {
  if (locked || st.flipped.length >= 2 || st.flipped.find(f => f.uid === uid)) return;
  const card = st.cards.find(c => c.uid === uid);
  st.flipped.push(card);
  // Show front
  const el = [...document.querySelectorAll('[data-uid]')].find(e => e.dataset.uid === uid);
  if (el) { el.children[0].style.display='none'; el.children[1].style.display='flex'; }
  if (st.flipped.length === 2) { locked = true; setTimeout(checkPair, 600); }
}

function checkPair() {
  const [a, b] = st.flipped;
  if (a.pairId === b.pairId) {
    pendingPair = {a, b};
    showModal();
  } else {
    // Karten passen nicht → zurückdrehen + Spieler wechseln
    setTimeout(() => {
      renderGrid(); // re-render resets flipped display
      st.flipped = [];
      st.current = st.current === 1 ? 2 : 1;
      updateTurnUI(false);
      renderGrid();
      locked = false;
    }, 700);
  }
}

function showModal() {
  const c = st.current;
  const isP1 = c === 1;
  const bg = isP1 ? '#EEEDFE' : '#E1F5EE';
  const col = isP1 ? '#3C3489' : '#085041';
  const who = document.getElementById('modalWho');
  who.textContent = `${st.names[c]} wählt`;
  who.style.background = bg; who.style.color = col;
  const cardData = st.cards.find(x => x.uid === pendingPair.a.uid);
  const tag = document.getElementById('modalCatTag');
  tag.textContent = `${cardData.emoji} ${cardData.topic}`;
  tag.style.background = cardData.color; tag.style.color = cardData.tc;
  document.getElementById('modalFeedback').style.display = 'none';
  document.getElementById('modalHint').style.display = 'none';
  document.getElementById('modalOk').style.display = 'none';
  const sA = st.cards.find(c => c.uid === pendingPair.a.uid);
  const sB = st.cards.find(c => c.uid === pendingPair.b.uid);
  const order = Math.random() < 0.5 ? [sA, sB] : [sB, sA];
  ['modalA','modalB'].forEach((id, i) => {
    const s = order[i];
    const d = document.createElement('button');
    d.style.cssText = 'width:100%;text-align:left;padding:12px 14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;background:white;cursor:pointer;font-size:13px;line-height:1.6;color:#1a1a1a;';
    d.innerHTML = `<strong style="color:#888;margin-right:8px">${i===0?'A':'B'}.</strong>${s.sentence}`;
    d.onclick = () => chooseAnswer(s.isRight, d, s.hint);
    document.getElementById(id).innerHTML = '';
    document.getElementById(id).appendChild(d);
  });
  const modal = document.getElementById('modal');
  modal.style.display = 'flex';
}

function chooseAnswer(isRight, btn, hint) {
  document.querySelectorAll('#modalA button, #modalB button').forEach(b => b.disabled = true);
  const fb = document.getElementById('modalFeedback');
  const hintEl = document.getElementById('modalHint');
  fb.style.display = 'block';
  if (isRight) {
    btn.style.background = '#E1F5EE'; btn.style.borderColor = '#1D9E75';
    fb.textContent = `✓ Richtig! Punkt für ${st.names[st.current]}! 🎉 Nochmal aufdecken!`;
    fb.style.background = '#E1F5EE'; fb.style.color = '#085041'; fb.style.border = '1px solid #1D9E75';
    st.matched[pendingPair.a.pairId] = st.current;
    st.scores[st.current]++;
    document.getElementById(`p${st.current}score`).textContent = st.scores[st.current];
    st.bonus = true;
    document.getElementById('modalOk').textContent = '▶ Nochmal aufdecken!';
  } else {
    btn.style.background = '#FCEBEB'; btn.style.borderColor = '#E24B4A';
    fb.textContent = '✗ Leider falsch! Das Paar kommt nochmal.';
    fb.style.background = '#FCEBEB'; fb.style.color = '#791F1F'; fb.style.border = '1px solid #E24B4A';
    hintEl.textContent = '💡 Tipp: ' + hint;
    hintEl.style.display = 'block';
    st.bonus = false;
    document.getElementById('modalOk').textContent = 'Paar zurücklegen';
  }
  document.getElementById('modalOk').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  const gotBonus = st.bonus;
  st.flipped = [];
  if (!gotBonus) {
    // Falsche Satzwahl → Spieler wechseln
    st.current = st.current === 1 ? 2 : 1;
  }
  // Bei richtigem Satz (bonus) → gleicher Spieler bleibt dran
  pendingPair = null;
  st.bonus = false;
  updateTurnUI(gotBonus);
  renderGrid();
  locked = false;
  if (Object.keys(st.matched).length === st.pairs) setTimeout(showWin, 300);
}

function showWin() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('winScreen').style.display = 'block';
  const s1 = st.scores[1], s2 = st.scores[2];
  document.getElementById('winEmoji').textContent = s1 === s2 ? '🤝' : '🏆';
  document.getElementById('winTitle').textContent = s1 > s2 ? `${st.names[1]} gewinnt!` : s2 > s1 ? `${st.names[2]} gewinnt!` : 'Unentschieden!';
  document.getElementById('wScore1').textContent = s1;
  document.getElementById('wName1').textContent = st.names[1];
  document.getElementById('wScore2').textContent = s2;
  document.getElementById('wName2').textContent = st.names[2];
  if (s1 > s2) document.getElementById('winBox1').style.outline = '3px solid gold';
  if (s2 > s1) document.getElementById('winBox2').style.outline = '3px solid gold';
}

function resetAll() {
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
}
</script>
